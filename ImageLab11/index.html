<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lab 10 - Unreal Summer World</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>
      <a-assets>
        <img id="summerSky" src="summersky.jpeg" />
      </a-assets>

      <!-- 360 sky -->
      <a-sky src="#summerSky" rotation="0 -90 0"></a-sky>

      <!-- Ground -->
      <a-plane
        position="0 0 -4"
        rotation="-90 0 0"
        width="40"
        height="40"
        color="#E7D3A1">
      </a-plane>

      <!-- Camera -->
      <a-entity position="0 1.6 5">
        <a-camera></a-camera>
      </a-entity>

      <!-- Lights -->
      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="directional" intensity="1.1" position="2 4 3"></a-light>

      <!-- Object 1: Ice cream cone -->
      <a-cone
        position="-2 0.9 -3"
        radius-bottom="0.35"
        radius-top="0.05"
        height="1.1"
        color="#C68642">
      </a-cone>

      <a-sphere
        position="-2 1.65 -3"
        radius="0.32"
        color="#FFB6C1">
      </a-sphere>

      <a-sphere
        position="-1.75 1.95 -3"
        radius="0.18"
        color="#FFF8DC">
      </a-sphere>

      <!-- Object 2: Beach umbrella -->
      <a-cylinder
        position="0 1 -4"
        radius="0.04"
        height="2"
        color="#8B5A2B">
      </a-cylinder>

      <a-cone
        position="0 2.15 -4"
        radius-bottom="1.1"
        radius-top="0.05"
        height="0.7"
        color="#FF5E5E">
      </a-cone>

      <!-- Object 3: Sandcastle -->
      <a-box
        position="2 0.6 -3.5"
        width="1.4"
        height="1.2"
        depth="1.2"
        color="#DDB892">
      </a-box>

      <a-cylinder
        position="1.45 1.2 -3.5"
        radius="0.18"
        height="0.7"
        color="#DDB892">
      </a-cylinder>

      <a-cylinder
        position="2 1.2 -2.95"
        radius="0.18"
        height="0.7"
        color="#DDB892">
      </a-cylinder>

      <a-cylinder
        position="2.55 1.2 -3.5"
        radius="0.18"
        height="0.7"
        color="#DDB892">
      </a-cylinder>

      <a-cylinder
        position="2 1.2 -4.05"
        radius="0.18"
        height="0.7"
        color="#DDB892">
      </a-cylinder>

      <!-- Extra object: Beach ball -->
      <a-sphere
        position="0.9 0.35 -2.3"
        radius="0.35"
        color="#FFD54F">
      </a-sphere>

    </a-scene>
  </body>
</html>
