<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lab 10 - Unreal Summer World</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>
      <a-assets>
        <!-- Replace these with your own files -->
        <img id="summerSky" src="images/summer360.jpg" />
        <img id="sandTex" src="images/sand.jpg" />
        <img id="umbrellaTex" src="images/umbrella.jpg" />
        <img id="coneTex" src="images/cone.jpg" />
        <img id="iceCreamTex" src="images/icecream.jpg" />
        <img id="castleTex" src="images/sandcastle.jpg" />
      </a-assets>

      <!-- 360 sky -->
      <a-sky src="#summerSky" rotation="0 -90 0"></a-sky>

      <!-- Ground -->
      <a-plane
        position="0 0 -3"
        rotation="-90 0 0"
        width="30"
        height="30"
        src="#sandTex"
        repeat="10 10">
      </a-plane>

      <!-- Camera -->
      <a-entity position="0 1.6 4">
        <a-camera></a-camera>
      </a-entity>

      <!-- Object 1: Ice Cream Cone -->
      <a-cone
        position="-2 1 -3"
        radius-bottom="0.5"
        radius-top="0.05"
        height="1.5"
        src="#coneTex">
      </a-cone>

      <a-sphere
        position="-2 2 -3"
        radius="0.45"
        src="#iceCreamTex">
      </a-sphere>

      <!-- Object 2: Beach Umbrella -->
      <a-cylinder
        position="0 1 -4"
        radius="0.05"
        height="2"
        color="#8B5A2B">
      </a-cylinder>

      <a-cone
        position="0 2.2 -4"
        radius-bottom="1.2"
        radius-top="0.05"
        height="0.8"
        rotation="0 0 0"
        src="#umbrellaTex">
      </a-cone>

      <!-- Object 3: Sandcastle -->
      <a-box
        position="2 0.75 -3"
        width="1.5"
        height="1.5"
        depth="1.5"
        src="#castleTex">
      </a-box>

      <a-cylinder
        position="1.35 1.5 -3"
        radius="0.2"
        height="1"
        src="#castleTex">
      </a-cylinder>

      <a-cylinder
        position="2 1.5 -2.35"
        radius="0.2"
        height="1"
        src="#castleTex">
      </a-cylinder>

      <a-cylinder
        position="2.65 1.5 -3"
        radius="0.2"
        height="1"
        src="#castleTex">
      </a-cylinder>

      <a-cylinder
        position="2 1.5 -3.65"
        radius="0.2"
        height="1"
        src="#castleTex">
      </a-cylinder>

      <!-- sun -->
      <a-sphere
        position="0 8 -10"
        radius="1.2"
        color="#FFD54F"
        emissive="#FFD54F">
      </a-sphere>

      <!-- Light -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="1 3 2" intensity="0.8"></a-light>
    </a-scene>
  </body>
</html>
