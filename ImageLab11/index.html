<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lab 10 - Unreal Summer World</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>
      <a-assets>
        <img id="summerSky" src="summersky.jpeg" />
      </a-assets>

      <a-sky src="#summerSky" rotation="0 -90 0"></a-sky>

      <a-plane
        position="0 0 -4"
        rotation="-90 0 0"
        width="40"
        height="5"
        color="#E7D3A1">
      </a-plane>

      <a-entity position="0 1.6 0">
        <a-camera></a-camera>
      </a-entity>

      <a-light type="ambient" intensity="1.15"></a-light>
      <a-light type="directional" intensity="1" position="2 4 3"></a-light>

      <a-cone
        position="-1.4 0.55 -4.4"
        radius-bottom="0.35"
        radius-top="0.05"
        height="1.1"
        color="#C68642">
      </a-cone>

      <a-sphere
        position="-1.4 1.25 -4.4"
        radius="0.32"
        color="#FFB6C1">
      </a-sphere>

      <a-sphere
        position="-1.18 1.52 -4.4"
        radius="0.16"
        color="#FFF8DC">
      </a-sphere>

      <a-cylinder
        position="0.3 0.95 -5.0"
        radius="0.04"
        height="1.9"
        color="#8B5A2B">
      </a-cylinder>

      <a-cone
        position="0.3 1.95 -5.0"
        radius-bottom="1.0"
        radius-top="0.05"
        height="0.65"
        color="#FF5E5E">
      </a-cone>

      <a-box
        position="1.8 0.5 -4.6"
        width="1.2"
        height="1.0"
        depth="1.0"
        color="#DDB892">
      </a-box>

      <a-cylinder
        position="1.35 1.0 -4.6"
        radius="0.14"
        height="0.55"
        color="#DDB892">
      </a-cylinder>

      <a-cylinder
        position="1.8 1.0 -4.25"
        radius="0.14"
        height="0.55"
        color="#DDB892">
      </a-cylinder>

      <a-cylinder
        position="2.24 1.0 -4.6"
        radius="0.14"
        height="0.55"
        color="#DDB892">
      </a-cylinder>

      <a-cylinder
        position="1.9 1.0 -4.9"
        radius="0.14"
        height="0.55"
        color="#DDB892">
      </a-cylinder>

      <a-sphere
        position="0.9 0.3 -3.9"
        radius="0.28"
        color="#FFD54F">
      </a-sphere>
    </a-scene>
  </body>
</html>
