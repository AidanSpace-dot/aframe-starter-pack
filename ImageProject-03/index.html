<!DOCTYPE html>
<html>
  <head>
    <title>Project 03 - Celestial Chessboard</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>

      <a-assets>
        <img id="king" src="assets/king.obj"></a-asset-item>
        <img id="queen" src="assets/queen.obj"></a-asset-item>
        <img id="knight" src="assets/knight.obj"></a-asset-item>
        <img id="bishup" src="assets/bishup.obj"></a-asset-item>
        <img id="rook" src="assets/rook.obj"></a-asset-item>
        <img id="pawn" src="assets/pawn.obj"></a-asset-item>
      </a-assets>

      <a-sky color="#dbeeff"></a-sky>
      <a-light type="ambient" color="#888"></a-light>
      <a-light type="point" intensity="1.2" position="2 8 4"></a-light>
      
      <a-entity position="0 8 14" rotation="-30 0 0">
        <a-camera></a-camera>
      </a-entity>

      <a-box position="0 -0.2 0" width="18" height="0.4" depth="18" color="#8B5E3C"></a-box>

      <!-- BOARD -->
